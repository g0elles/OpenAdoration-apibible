name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet test OpenAdoration.ApiBible.slnx --configuration Release
      - shell: pwsh
        run: ./build.ps1
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/apibible.oaplugin
          generate_release_notes: true
